spring.application.name=vibbraneo-api
spring.jpa.database=mysql
spring.datasource.url=jdbc:mysql://localhost:3306/vibbrance?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true 
spring.flyway.url=jdbc:mysql://localhost:3306/vibbrance?createDatabaseIfNotExist=true
spring.flyway.user=root
spring.flyway.password=root
spring.flyway.locations=classpath:db/migration